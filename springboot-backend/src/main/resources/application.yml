server:
  port: ${PORT:5006} # Running on 5006, configurable via environment
  servlet:
    context-path: /api/v1

spring:
  application:
    name: chamasmart-backend
  
  datasource:
    # Optimized for Neon Serverless PostgreSQL & Local Fallback
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chamasmart}?sslmode=prefer}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 15
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 1800000 # 30 minutes max lifetime to prevent Neon serverless connection drops
      keepalive-time: 30000 # Keepalive heartbeats for Neon proxy

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate} # Validates existing schema without altering tables
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      # Optimized for Upstash / Render Redis & Local Fallback
      host: ${SPRING_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${SPRING_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${SPRING_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      ssl: ${SPRING_REDIS_SSL:false}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:9b72cfb8b9012a613d5289f8125890b98213749128374981273981273918273918273981273}
      expiration-ms: 86400000 # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
