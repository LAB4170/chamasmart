server:
  port: 5006 # Running on 5006 to allow side-by-side proxying with Node.js on 5005
  servlet:
    context-path: /api/v1

spring:
  application:
    name: chamasmart-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chamasmart}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      connection-timeout: 2000

  jpa:
    hibernate:
      ddl-auto: validate # Validates existing schema without altering Node.js tables
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:9b72cfb8b9012a613d5289f8125890b98213749128374981273981273918273918273981273}
      expiration-ms: 86400000 # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
